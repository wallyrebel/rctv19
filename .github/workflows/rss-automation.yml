name: Automated RSS to Blog Pipeline

on:
  schedule:
    # Runs at 8:00 AM and 8:00 PM CDT (13:00 and 01:00 UTC)
    - cron: '0 1,13 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci || npm install
        
      - name: Run RSS to Blog script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch-rss-summary.js
        
      - name: Commit and push if changes exist
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/blog/ src/assets/img/posts/ scripts/processed_items.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-published new blog post from RSS feed" && git push)
